name: Python

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: 'Python tests'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # No compilation: hatch_build.py downloads the prebuilt libopenjph_c
      # from the C-v* release pinned in pyproject.toml — the same path every
      # consumer of pyopenjph takes (mirroring julia-tests and Artifacts.toml).
      - name: Install
        run: python -m pip install ".[test,zarr]"
      - name: Test
        run: pytest tests
