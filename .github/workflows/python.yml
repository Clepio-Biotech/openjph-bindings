name: Python

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: 'Python tests'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install cmake
        run: sudo apt-get install -y cmake
      - name: Install
        env:
          NATIVE_PATH: ${{ github.workspace }}/native
        run: python -m pip install ".[test,zarr]"
      - name: Test
        run: pytest tests
