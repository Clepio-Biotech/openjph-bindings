name: Python

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      c-release:
        description: "C-v* release to package (default: the pin in python/pyproject.toml)"
        required: false
        default: ""
  push:
    tags: ["Python-v*"]


defaults:
  run:
    working-directory: python


jobs:

  # ------------------------------
  test-source:
    name: 'Python tests from source  on ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      # No compilation: hatch_build.py downloads the prebuilt libopenjph_c
      # from the C-v* release pinned in pyproject.toml — the same path every
      # consumer of pyopenjph takes (mirroring julia-tests and Artifacts.toml).
      - name: Install
        run: python -m pip install ".[test,zarr]"
      - name: Test
        run: pytest tests

  # ------------------------------
  build-wheels:
    name: 'Python build wheels (all platforms)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: python -m pip install build
      - name: Build all platform wheels
        env:
          PYOPENJPH_NATIVE_RELEASE: ${{ inputs.c-release }}
        run: python tools/build_wheels.py --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-wheels
          path: dist/*.whl
          if-no-files-found: error

  # ------------------------------
  build-sdist:
    name: 'Python build sdist'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist . --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ------------------------------
  test-wheels:
    name: 'Python test from wheel on ${{ matrix.os }}'
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v8
        with:
          name: pyopenjph-wheels
          path: dist
      - name: Install wheel
        run: |
          python -m pip install "numpy>=2,<3" "pytest>=8" "zarr>=3.1.3"
          python -m pip install --no-index --no-deps --find-links dist pyopenjph
      - name: Test
        run: pytest tests

  # ------------------------------
  publish:
    name: 'Python publish'
    if: startsWith(github.ref, 'refs/tags/Python-v')
    needs: [build-wheels, build-sdist, test-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyopenjph
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Tag matches package version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/Python-v}
          PKG_VERSION=$(grep -Po '^version = "\K[^"]+' python/pyproject.toml)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match python/pyproject.toml ($PKG_VERSION)"
            exit 1
          fi
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
