name: wheels

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-python-wheels:
    name: python ${{ matrix.os }} ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: "x86_64 aarch64"
            arch_label: "x86_64-aarch64"
          - os: macos-15-intel
            archs: "x86_64"
            arch_label: "x86_64"
          - os: macos-15
            archs: "arm64"
            arch_label: "arm64"
          - os: windows-latest
            archs: "AMD64"
            arch_label: "AMD64"
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
        if: runner.os == 'Linux'
        with:
          platforms: arm64
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pypa/cibuildwheel@v4.1
        with:
          package-dir: python
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-wheels-${{ matrix.os }}-${{ matrix.arch_label }}
          path: ./wheelhouse/*.whl

  build-python-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist python --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-sdist
          path: dist/*.tar.gz

  publish-python:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
