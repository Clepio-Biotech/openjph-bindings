name: wheels

# Python's release pipeline, the wgpu-py way: nothing is compiled — wheels are
# built on one runner by packaging the prebuilt libopenjph_c from the C-v*
# release pinned in python/pyproject.toml [tool.pyopenjph]. Cutting a
# Python-v* tag is the one deliberate moment Python switches C binary.
on:
  workflow_dispatch:
    inputs:
      c-release:
        description: "C-v* release to package (default: the pin in python/pyproject.toml)"
        required: false
        default: ""
  push:
    tags: ["Python-v*"]

jobs:

  build-wheels:
    name: Build wheels (all platforms)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - name: Build all platform wheels
        env:
          PYOPENJPH_NATIVE_RELEASE: ${{ inputs.c-release }}
        run: python tools/build_wheels.py --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-wheels
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist python --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # Install the built wheel on every platform we ship (pip auto-selects the
  # matching one) and run the test suite — the import-time self-test also
  # verifies the packaged binary matches the expected C ABI.
  test-wheels:
    name: Test wheel ${{ matrix.os }}
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-15-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: pyopenjph-wheels
          path: dist
      - name: Install wheel
        run: |
          python -m pip install "numpy>=2,<3" "pytest>=8" "zarr>=3.1.3"
          python -m pip install --no-index --no-deps --find-links dist pyopenjph
      - name: Test
        run: pytest python/tests

  publish-python:
    if: startsWith(github.ref, 'refs/tags/Python-v')
    needs: [build-wheels, build-sdist, test-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyopenjph
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Tag matches package version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/Python-v}
          PKG_VERSION=$(grep -Po '^version = "\K[^"]+' python/pyproject.toml)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match python/pyproject.toml ($PKG_VERSION)"
            exit 1
          fi
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
