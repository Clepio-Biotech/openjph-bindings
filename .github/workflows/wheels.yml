name: wheels

on:
  # pull_request:
  # push:
  #   branches: [main]
  #   tags: ["v*"]
  workflow_dispatch:

jobs:
  build-python-wheels:
    name: python ${{ matrix.os }} ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest        # native x86_64
            archs: "x86_64"
            arch_label: "x86_64"
          - os: ubuntu-24.04-arm     # native aarch64 runner — no QEMU emulation
            archs: "aarch64"
            arch_label: "aarch64"
          - os: macos-15-intel
            archs: "x86_64"
            arch_label: "x86_64"
          - os: macos-latest
            archs: "arm64"
            arch_label: "arm64"
          - os: windows-latest
            archs: "AMD64"
            arch_label: "AMD64"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pypa/cibuildwheel@v4.1
        with:
          package-dir: python
        env:
          CIBW_ARCHS: ${{ matrix.archs }}
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-wheels-${{ matrix.os }}-${{ matrix.arch_label }}
          path: ./wheelhouse/*.whl

  build-python-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist python --outdir dist
      - uses: actions/upload-artifact@v7
        with:
          name: pyopenjph-sdist
          path: dist/*.tar.gz

  publish-python:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Recycle the native library cibuildwheel already built into each wheel and
  # publish it for Julia as one tarball per platform: a real release on a v* tag,
  # an updatable dev pre-release on a PR. No separate native build — valid because
  # OpenJPH is statically embedded (the in-wheel lib has no external deps).
  publish-native:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    needs: build-python-wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: wheelhouse
          pattern: pyopenjph-wheels-*
          merge-multiple: true
      - name: Extract native libraries from wheels
        run: |
          suffix=""
          [ "${{ github.event_name }}" = "pull_request" ] && suffix="-dev"
          bash tools/extract_native_from_wheels.sh wheelhouse native-dist "$suffix"
      - name: Publish release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: native-dist/*.tar.gz
      - name: Publish dev pre-release (PR)
        if: github.event_name == 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev-pr-${{ github.event.pull_request.number }}
          name: Dev build (PR #${{ github.event.pull_request.number }})
          prerelease: true
          files: native-dist/*.tar.gz
