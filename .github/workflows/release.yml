name: Release

on:
  push:
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build native/ -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Stage artifact (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        run: cp build/libopenjph_c.so libopenjph_c-linux-x86_64.so

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: libopenjph_c-linux-x86_64.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage artifact (dev pre-release)
        if: github.event_name == 'pull_request'
        run: cp build/libopenjph_c.so libopenjph_c-linux-x86_64-dev.so

      - name: Create dev pre-release
        if: github.event_name == 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-pr-${{ github.event.pull_request.number }}
          name: Dev build (PR #${{ github.event.pull_request.number }})
          prerelease: true
          files: libopenjph_c-linux-x86_64-dev.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
