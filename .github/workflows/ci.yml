name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      # Only the C/native lineage's tags trigger this pipeline. Julia-v*/
      # Python-v* are plain git tags with no CI action of their own — see
      # docs/RELEASING.md.
      - 'C-v*'
  pull_request:
    branches:
      - main



jobs:

# ------------------------------ GENERIC ------------------------------

  # ------------------------------
  generic-lint:
    name: 'Generic lint of the repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pipx run pre-commit run --all-files

  # ------------------------------
  generic-version-check:
    name: 'Generic version check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract version
        # Exact same line is used in publish to check the tag
        run: echo "CPP_VERSION=C-v$(sed -n 's/.*version\[\] = "\(.*\)".*/\1/p' native/src/openjph_c.cpp)" >> "$GITHUB_ENV"
      - name: Versions agree across the monorepo
        run: |
          echo "current env.CPP_VERSION: ${{ env.CPP_VERSION }}"
          bash tests/check_versions.sh

  # ------------------------------
  generic-roundtrip:
    name: 'Generic roundtrip'
    needs: [native-done, python-done, julia-done]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Install cmake
        run: sudo apt-get install -y cmake
      - name: Install pyopenjph
        env:
          NATIVE_PATH: ${{ github.workspace }}/native
        # Non-editable install so the built libopenjph_c.so is copied next to
        # _backend.py (a scikit-build-core editable install leaves it in a build
        # dir where the loader can't find it).
        run: python -m pip install "./python[zarr]"
      - name: Build Julia packages
        run: julia --project=julia/ZarrCompressorJPH.jl -e 'import Pkg; Pkg.instantiate(); Pkg.build("OpenJPH")'
      - name: Cross-language Zarr interop
        run: bash tests/interop/run.sh

  # ------------------------------
  generic-done:
    needs: [generic-lint, generic-version-check, generic-roundtrip]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Generic part is done"


  # ------------------------------ NATIVE ------------------------------

  # ------------------------------
  native-linux-build:
    name: Native build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            image: manylinux_2_28_x86_64
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            image: manylinux_2_28_aarch64
    env:
      IMAGE: ${{ matrix.image }}
      ARCHIVE_NAME: "openjph_c-${{ matrix.name }}.zip"
      # Julia's Pkg.Artifacts only unpacks tarballs, not zips — this tarball
      # is what julia/OpenJPH.jl/Artifacts.toml ends up pointing to.
      ARCHIVE_NAME_TAR: "openjph_c-${{ matrix.name }}.tar.gz"
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: |
          cd native
          CID=$(docker create -t -w /tmp/work -v $PWD:/tmp/src:ro quay.io/pypa/$IMAGE bash -c "\
            cp -r /tmp/src/. . && \
            rm -rf ./build && \
            export USER=root && \
            dnf install -y zip && \
            cmake -B build . -DCMAKE_BUILD_TYPE=Release && \
            cmake --build build  && \
            mkdir dist && cp ./build/*.so ./dist/ && cp ./include/*.h ./dist/ && \
            cd dist && \
            zip -r ../${{ env.ARCHIVE_NAME }} * && \
            tar czf ../${{ env.ARCHIVE_NAME_TAR }} *")
          docker start -ai $CID
          mkdir -p dist
          docker cp $CID:/tmp/work/dist/. dist/.
          docker cp $CID:/tmp/work/${{ env.ARCHIVE_NAME }} .
          docker cp $CID:/tmp/work/${{ env.ARCHIVE_NAME_TAR }} .
          docker rm $CID
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          path: |
            native/${{ env.ARCHIVE_NAME }}
            native/${{ env.ARCHIVE_NAME_TAR }}
          name: 'native-${{ matrix.name }}'
          if-no-files-found: error

  # ------------------------------
  native-windows-build:
    name: Native build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
          - name:  windows-aarch64
            os: windows-11-arm
    env:
      ARCHIVE_NAME: "openjph_c-${{ matrix.name }}.zip"
      ARCHIVE_NAME_TAR: "openjph_c-${{ matrix.name }}.tar.gz"
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: |
          cd native
          cmake -B build . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          mkdir dist && cp ./build/Release/*.dll ./dist/ && cp ./include/*.h ./dist/
          cd dist
          7z a -tzip ../${{ env.ARCHIVE_NAME }} *;
          tar czf ../${{ env.ARCHIVE_NAME_TAR }} *
        shell: bash
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          path: |
            native/${{ env.ARCHIVE_NAME }}
            native/${{ env.ARCHIVE_NAME_TAR }}
          name: 'native-${{ matrix.name }}'
          if-no-files-found: error

  # ------------------------------
  native-macos-build:
    name: Native build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
          - name: macos-x86_64
            os: macos-15-intel
    env:
      # Need aligned_malloc, which is only available from 10.15+
      MACOSX_DEPLOYMENT_TARGET: "10.15"
      ARCHIVE_NAME: "openjph_c-${{ matrix.name }}.zip"
      ARCHIVE_NAME_TAR: "openjph_c-${{ matrix.name }}.tar.gz"
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: |
          cd native
          cmake -B build . -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          mkdir dist && cp ./build/*.dylib ./dist/ && cp ./include/*.h ./dist/
          cd dist
          zip -r ../${{ env.ARCHIVE_NAME }} *
          tar czf ../${{ env.ARCHIVE_NAME_TAR }} *
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          path: |
            native/${{ env.ARCHIVE_NAME }}
            native/${{ env.ARCHIVE_NAME_TAR }}
          name: 'native-${{ matrix.name }}'
          if-no-files-found: error

  # ------------------------------
  native-sanitizer:
    name: 'Native Sanitizer'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install cmake
        run: sudo apt-get install -y cmake
      # Sanitizer flags go through CMAKE_<LANG>_FLAGS so the FetchContent'd
      # OpenJPH objects embedded in libopenjph_c are instrumented too.
      - name: Configure with AddressSanitizer
        run: >
          cmake -S native -B build-asan
          -DCMAKE_BUILD_TYPE=Debug
          -DOPENJPH_C_BUILD_TESTS=ON
          -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g"
          -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address"
      - name: Build
        run: cmake --build build-asan -j
      - name: Run leak tests (LeakSanitizer)
        env:
          ASAN_OPTIONS: detect_leaks=1
        run: ctest --test-dir build-asan --output-on-failure

  # ------------------------------
  native-done:
    needs: [native-linux-build, native-macos-build, native-windows-build, native-sanitizer]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Native part is done"


  # ------------------------------ PYTHON ------------------------------

  # ------------------------------
  python-tests:
    name: 'Python tests'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install cmake
        run: sudo apt-get install -y cmake
      - name: Install
        env:
          NATIVE_PATH: ${{ github.workspace }}/native
        run: python -m pip install ".[test,zarr]"
      - name: Test
        run: pytest tests

  # ------------------------------
  python-done:
    needs: [python-tests]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Python part is done"


  # ------------------------------ JULIA ------------------------------

  # ------------------------------
  julia-tests:
    name: 'Julia tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Install cmake
        run: sudo apt-get install -y cmake
      # No NATIVE_PATH on purpose: this exercises build.jl's in-monorepo
      # sibling-detection of native/ — the path a fresh monorepo build actually
      # uses, and the one whose breakage previously shipped unnoticed.
      - name: Test OpenJPH
        run: julia --project=julia/OpenJPH.jl -e 'import Pkg; Pkg.instantiate(); Pkg.build("OpenJPH"); Pkg.test()'
      - name: Test ZarrCompressorJPH
        run: julia --project=julia/ZarrCompressorJPH.jl -e 'import Pkg; Pkg.instantiate(); Pkg.build("OpenJPH"); Pkg.test()'

  # ------------------------------
  julia-done:
    needs: [julia-tests]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Julia part is done"




  # ------------------------------ PUBLISH ------------------------------

  # ------------------------------
  publish-github:
    name: Publish libs to Github
    if: success() && startsWith(github.ref, 'refs/tags/C-v')
    needs: [native-done, python-done, julia-done, generic-done]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: set version (which gets used as release name)
        run: |
          echo "TAG_VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
          echo "CPP_VERSION=C-v$(sed -n 's/.*version\[\] = "\(.*\)".*/\1/p' native/src/openjph_c.cpp)" >> "$GITHUB_ENV"
          if [ "$CPP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match source version ($CPP_VERSION)"
            exit 1
          fi
          echo "Versions match: $CPP_VERSION and $TAG_VERSION"
        shell: bash
      - name: Download assets
        uses: actions/download-artifact@v8
        with:
          path: dist
      - run: find dist -type f
      - name: Create commit-sha file
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo $GITHUB_SHA > dist/commit-sha
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_VERSION }}
          name: ${{ env.TAG_VERSION }}
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/commit-sha
          body: |
            Precompiled binary modules.
          draft: false
          prerelease: false

  # ------------------------------
  # TODO: enable in a next PR that also updates the wrapper to not need a build step. Mind the `&& false`  and set needs
  publish-pypi:
    name: Publish to Github and Pypi
    if: success() && startsWith(github.ref, 'refs/tags/v') && false
    needs: [python-done, generic-done]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openjph-bindings
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Download assets
      uses: actions/download-artifact@v4
      with:
        path: dist
    - name: Flatten dist dir
      run: |
        find dist -mindepth 2 -type f -exec mv -f '{}' dist/ ';'
        rm -rf dist/*/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
