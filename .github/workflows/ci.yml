name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

# ------------------------------ GENERIC ------------------------------

  # ------------------------------
  generic-lint:
    name: 'Generic lint of the repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pipx run pre-commit run --all-files

  # ------------------------------
  generic-version-check:
    name: 'Generic version check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract version
        # Exact same line is used in publish to check the tag
        run: echo "CPP_VERSION=C-v$(sed -n 's/.*version\[\] = "\(.*\)".*/\1/p' native/src/openjph_c.cpp)" >> "$GITHUB_ENV"
      - name: Versions agree across the monorepo
        run: |
          echo "current env.CPP_VERSION: ${{ env.CPP_VERSION }}"
          bash tests/check_versions.sh

  # ------------------------------
  generic-roundtrip:
    name: 'Generic roundtrip'
    needs: [native-done, python-done, julia-done]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      # Both sides resolve their pinned, published C release binary — Python
      # via hatch_build.py's download, Julia via Artifacts.toml.
      - name: Install jp15
        run: python -m pip install "./python[zarr]"
      - name: Instantiate Julia packages
        run: julia --project=julia/ZarrCompressorJPH.jl -e 'import Pkg; Pkg.instantiate()'
      - name: Cross-language Zarr interop
        run: bash tests/interop/run.sh

  # ------------------------------
  generic-done:
    needs: [generic-lint, generic-version-check, generic-roundtrip]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Generic part is done"


  # ------------------------------ REUSABLE WORKFLOWS ------------------------------

  # ------------------------------
  native-done:
    name: Native
    permissions:
      contents: write
    uses: ./.github/workflows/native.yml

  # ------------------------------
  python-done:
    name: Python
    permissions:
      id-token: write
    uses: ./.github/workflows/python.yml

  # ------------------------------
  julia-openjph:
    name: Julia OpenJPH.jl
    uses: ./.github/workflows/julia-openjph.yml

  julia-zarrcompressorjph:
    name: Julia ZarrCompressorJPH.jl
    uses: ./.github/workflows/julia-zarrcompressorjph.yml

  # ------------------------------
  julia-done:
    needs: [julia-openjph, julia-zarrcompressorjph]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Julia part is done"
