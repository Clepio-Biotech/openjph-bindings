name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      # Only the C/native lineage's tags trigger this build/publish pipeline.
      - 'C-v*'
  pull_request:
    branches:
      - main



jobs:

# ------------------------------ GENERIC ------------------------------

  # ------------------------------
  generic-lint:
    name: 'Generic lint of the repo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pipx run pre-commit run --all-files

  # ------------------------------
  generic-version-check:
    name: 'Generic version check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract version
        # Exact same line is used in publish to check the tag
        run: echo "CPP_VERSION=C-v$(sed -n 's/.*version\[\] = "\(.*\)".*/\1/p' native/src/openjph_c.cpp)" >> "$GITHUB_ENV"
      - name: Versions agree across the monorepo
        run: |
          echo "current env.CPP_VERSION: ${{ env.CPP_VERSION }}"
          bash tests/check_versions.sh

  # ------------------------------
  generic-roundtrip:
    name: 'Generic roundtrip'
    needs: [native, python-done, julia-done]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      # Both sides resolve their pinned, published C release binary — Python
      # via hatch_build.py's download, Julia via Artifacts.toml.
      - name: Install pyopenjph
        run: python -m pip install "./python[zarr]"
      - name: Instantiate Julia packages
        run: julia --project=julia/ZarrCompressorJPH.jl -e 'import Pkg; Pkg.instantiate()'
      - name: Cross-language Zarr interop
        run: bash tests/interop/run.sh

  # ------------------------------
  generic-done:
    needs: [generic-lint, generic-version-check, generic-roundtrip]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Generic part is done"


  # ------------------------------ NATIVE ------------------------------

  # ------------------------------
  # Native build/test jobs live in native.yml (split out per almarklein's
  # per-language CI suggestion, see PR #19 discussion). Called as a reusable
  # workflow rather than given its own push/pull_request triggers so it stays
  # part of this single CI run's dependency graph and tag gating.
  native:
    name: Native
    uses: ./.github/workflows/native.yml


  # ------------------------------ PYTHON ------------------------------

  # ------------------------------
  # Split out per almarklein's per-language CI suggestion (PR #19 discussion
  # r3565153820), same reusable-workflow pattern as native.yml/julia-*.yml.
  python:
    name: Python
    uses: ./.github/workflows/python.yml

  # ------------------------------
  python-done:
    needs: [python]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Python part is done"


  # ------------------------------ JULIA ------------------------------

  # ------------------------------
  # Each package is its own independent release lineage (OpenJPH.jl-v*,
  # ZarrCompressorJPH.jl-v*), so each gets its own reusable workflow file,
  # per almarklein's per-language CI split suggestion (PR #19 discussion
  # r3565153820) — same pattern as native.yml from step 2a.
  julia-openjph:
    name: Julia OpenJPH.jl
    uses: ./.github/workflows/julia-openjph.yml

  julia-zarrcompressorjph:
    name: Julia ZarrCompressorJPH.jl
    uses: ./.github/workflows/julia-zarrcompressorjph.yml

  # ------------------------------
  julia-done:
    needs: [julia-openjph, julia-zarrcompressorjph]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Julia part is done"




  # ------------------------------ PUBLISH ------------------------------

  # ------------------------------
  publish-github:
    name: Publish libs to Github
    # Only depends on native's build artifacts (the only thing this job
    # publishes) — gating on python-done/julia-done/generic-done as well
    # meant an unrelated failure (e.g. generic-version-check) silently
    # skipped the release with no tarballs published at all.
    if: success() && startsWith(github.ref, 'refs/tags/C-v')
    needs: [native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: set version (which gets used as release name)
        run: |
          echo "TAG_VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV
          echo "CPP_VERSION=C-v$(sed -n 's/.*version\[\] = "\(.*\)".*/\1/p' native/src/openjph_c.cpp)" >> "$GITHUB_ENV"
          if [ "$CPP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match source version ($CPP_VERSION)"
            exit 1
          fi
          echo "Versions match: $CPP_VERSION and $TAG_VERSION"
        shell: bash
      - name: Download assets
        uses: actions/download-artifact@v8
        with:
          path: dist
      - run: find dist -type f
      - name: Create commit-sha file
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo $GITHUB_SHA > dist/commit-sha
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_VERSION }}
          name: ${{ env.TAG_VERSION }}
          files: |
            dist/**/*.tar.gz
            dist/commit-sha
          body: |
            Precompiled binary modules.
          draft: false
          prerelease: false

  # PyPI publishing lives in wheels.yml (Python-v* tags), not here — this
  # pipeline is the C lineage's.
