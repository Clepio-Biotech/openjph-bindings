name: Julia ZarrCompressorJPH.jl

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: 'Julia tests: ZarrCompressorJPH.jl'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Test ZarrCompressorJPH
        run: julia --project=julia/ZarrCompressorJPH.jl -e 'import Pkg; Pkg.instantiate(); Pkg.test()'
